<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>『樂活金掌家』- 專業 AI 言語治療訓練系統</title>
    <style>
        :root { --ts-red: #D90429; --ts-bg: #F4EBD0; --gold: #D4AF37; --wa-green: #25D366; --paper: #FCF9F2; --speech-purple: #8338EC; --mouth-pink: #FF85A1; --ai-blue: #00B4D8; }
        body { font-family: "PingFang HK", "Microsoft JhengHei", sans-serif; background: var(--ts-bg); margin: 0; color: #333; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* 登入界面 */
        #login-screen { position: fixed; inset: 0; background: var(--ts-bg); z-index: 20000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .login-card { background: white; padding: 30px; border-radius: 30px; border: 5px solid var(--ts-red); text-align: center; width: 85%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        
        header { background: var(--paper); border-bottom: 6px double var(--ts-red); padding: 10px; text-align: center; }
        #app-content { display: none; flex-direction: column; flex: 1; overflow-y: auto; }
        
        /* 導覽按鈕 */
        .nav-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 15px; }
        .big-btn { height: 85px; border-radius: 20px; border: 4px solid white; color: white; font-size: 16px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.1); transition: 0.2s; }
        .big-btn:active { transform: scale(0.95); }
        
        /* AI 偵測與彈窗 */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 10000; justify-content: center; align-items: center; }
        .modal-content { background: var(--paper); border: 5px solid var(--gold); border-radius: 30px; width: 92%; max-width: 500px; padding: 15px; position: relative; max-height: 95vh; overflow-y: auto; text-align: center; }
        
        .ai-vision-box { width: 100%; height: 260px; background: #000; border-radius: 20px; position: relative; overflow: hidden; border: 4px solid var(--mouth-pink); margin: 10px 0; }
        #v-feed { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .ai-circle-target { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 160px; height: 160px; border: 6px dashed rgba(255,0,0,0.8); border-radius: 50%; pointer-events: none; }
        .ai-point-target { position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; background: #00ff00; border-radius: 50%; }

        /* 能量條 */
        #sound-bar-container { width: 100%; height: 30px; background: #ddd; border-radius: 15px; margin: 10px 0; border: 2px solid #555; overflow: hidden; }
        #sound-bar-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #25D366, #FFD700, #FF4500); }
        
        .grid-10 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .card-unit { background: #fff; border: 2px solid #ddd; border-radius: 12px; padding: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .card-unit:hover { border-color: var(--ts-red); background: #fffaf0; }
        .ctrl-panel { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 15px; }
        .sub-btn { height: 45px; border-radius: 12px; border: none; font-weight: bold; color: white; cursor: pointer; }
        .puzzle-key { background: white; border: 2px solid var(--ts-red); padding: 12px; border-radius: 10px; margin: 5px; cursor: pointer; width: 95%; text-align: left; font-size: 16px; font-weight: bold; }
    </style>
</head>
<body>

<!-- 1. 登入系統 (連動資料與驗證碼) -->
<div id="login-screen">
    <div class="login-card">
        <h2 style="color:var(--ts-red); margin-bottom:5px;">樂活金掌家</h2>
        <p style="margin-top:0; font-weight:bold;">言語治療訓練系統</p>
        <input type="text" id="case-id" style="width:90%; padding:12px; margin-bottom:10px; border-radius:10px; border:2px solid #ccc;" placeholder="個案代號 (ID)">
        <input type="password" id="case-pw" style="width:90%; padding:12px; margin-bottom:10px; border-radius:10px; border:2px solid #ccc;" placeholder="密碼 (PW)">
        <div id="v-box" onclick="refreshV()" style="background:#000; color:white; padding:10px; letter-spacing:8px; font-size:28px; margin:10px; border-radius:10px; cursor:pointer; font-family:monospace;">8888</div>
        <input type="text" id="v-in" style="width:90%; padding:12px; margin-bottom:15px; text-align:center; border-radius:10px; border:2px solid #ccc;" placeholder="輸入上方驗證碼">
        <button class="big-btn" style="background:var(--ts-red); width:100%; height:60px;" onclick="checkAuth()">進入訓練系統</button>
    </div>
</div>

<div id="app-content">
    <header>
        <div id="time" style="font-size:22px; font-weight:900;">00:00</div>
        <div style="font-weight:bold;">個案：<span id="u-name">---</span> | 💰 金幣：<span id="gold-val">0</span></div>
        <div style="margin-top:8px;">
            <button onclick="syncMongoDB()" style="background:var(--wa-green); color:white; border:none; padding:6px 12px; border-radius:8px; font-weight:bold;">📊 同步 MongoDB</button>
            <button id="logout-btn" style="background:#666; color:white; border:none; padding:6px 12px; border-radius:8px; margin-left:5px;">🚪 登出系統</button>
        </div>
    </header>

    <div class="nav-grid">
        <button class="big-btn" style="background:var(--mouth-pink);" onclick="showMouthUI()">👄 AI 口肌視覺訓練</button>
        <button class="big-btn" style="background:var(--speech-purple);" onclick="showCogCatalog()">🗣️ AI 認知訓練</button>
        <button class="big-btn" style="background:var(--ai-blue);" onclick="showSceneMenu()">📍 AI 真實情境應對</button>
        <button class="big-btn" style="background:var(--wa-green);" onclick="showGameUI('voice')">🎵 AI 聲控遊戲</button>
        <button class="big-btn" style="background:var(--ai-blue);" onclick="showGameUI('blow')">🎈 AI 氣量遊戲</button>
    </div>
</div>

<div id="modal-container" class="modal"><div class="modal-content" id="modal-body"></div></div>

<script>
    // --- 基礎配置與 10 目錄數據 ---
    const usersData = { "B5678": "56789", "A1234": "12345", "T9999": "99999", "K1111": "11111", "S2222": "22222" };
    let currentUser = null, goldCount = 100, vCodeStr = "", cameraStream = null;
    let targetGoal = 10, currentCount = 0, canTrigger = true;
    let audioCtx = null, analyser = null, voiceTimer = null, countdownTimer = null;

    const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognizer = SpeechRec ? new SpeechRec() : null;
    if(recognizer) { recognizer.lang = 'zh-HK'; recognizer.continuous = false; }

    const mouthData = [
        {n:"鼓腮 (Puffing)", i:"😗", bs:"cheekPuff"}, {n:"噘嘴 (Puckering)", i:"😙", bs:"mouthPucker"},
        {n:"張大口 (Open)", i:"😲", bs:"jawOpen"}, {n:"微笑 (Smiling)", i:"😊", bs:"mouthSmile"},
        {n:"舌伸出 (Tongue)", i:"👅", bs:"tongueOut"}, {n:"抿嘴 (Close)", i:"😐", bs:"mouthClose"},
        {n:"魚臉 (Fish Face)", i:"😚", bs:"mouthFrown"}, {n:"舌向上 (Up)", i:"⬆️", bs:"tongueUp"},
        {n:"舌向下 (Down)", i:"⬇️", bs:"tongueDown"}, {n:"露齒 (Hissing)", i:"😬", bs:"mouthSmile"}
    ];

    const cogData = [
        {t:"水果", i:[{n:"蘋果", p:"🍎", u:"紅紅甜甜，醫生遠離我", s:"蘋"},{n:"香蕉", p:"🍌", u:"黃色長條，猴子最愛", s:"香"},{n:"西瓜", p:"🍉", u:"夏天消暑，綠皮紅肉", s:"西"},{n:"橙", p:"🍊", u:"橙色圓圓，多維他命C", s:"橙"},{n:"葡萄", p:"🍇", u:"紫色一串串", s:"葡"}]},
        {t:"交通", i:[{n:"巴士", p:"🚌", u:"大大的車，有司機載客", s:"巴"},{n:"地鐵", p:"🚇", u:"地下行駛的火車", s:"地"},{n:"的士", p:"🚕", u:"跳錶計錢，紅色的車", s:"的"},{n:"飛機", p:"✈️", u:"在天空飛，去旅行用", s:"飛"},{n:"單車", p:"🚲", u:"用腳踏，有兩個圈", s:"單"}]},
        {t:"家居", i:[{n:"睡床", p:"🛏️", u:"累的時候用來睡覺", s:"睡"},{n:"檯燈", p:"💡", u:"照亮房間，寫字用", s:"檯"},{n:"鬧鐘", p:"⏰", u:"準時叫醒你起床", s:"鬧"},{n:"椅子", p:"🪑", u:"累的時候坐下", s:"椅"},{n:"雪櫃", p:"🧊", u:"保持食物新鮮冷冰冰", s:"雪"}]},
        {t:"蔬菜", i:[{n:"菜心", p:"🥬", u:"綠色長長的蔬菜", s:"菜"},{n:"番茄", p:"🍅", u:"紅色圓圓，多汁好味", s:"番"},{n:"薯仔", p:"🥔", u:"啡色皮，焗食炸食都好", s:"薯"},{n:"粟米", p:"🌽", u:"黃色粒粒，好甜好食", s:"粟"},{n:"西蘭花", p:"🥦", u:"像一棵綠色的小樹", s:"西"}]},
        {t:"動物", i:[{n:"大象", p:"🐘", u:"有長鼻子和大耳朵", s:"大"},{n:"獅子", p:"🦁", u:"萬獸之王，有鬃毛", s:"獅"},{n:"貓", p:"🐱", u:"喵喵叫，喜歡抓老鼠", s:"貓"},{n:"狗", p:"🐶", u:"汪汪叫，是人類好朋友", s:"狗"},{n:"猴子", p:"🐒", u:"喜歡爬樹食香蕉", s:"猴"}]},
        {t:"文具", i:[{n:"鉛筆", p:"✏️", u:"寫字工具，寫錯可擦", s:"鉛"},{n:"尺子", p:"📏", u:"測量長度，畫直線用", s:"尺"},{n:"書本", p:"📖", u:"閱讀知識，一頁頁的", s:"書"},{n:"剪刀", p:"✂️", u:"剪開紙張或布料", s:"剪"},{n:"膠水", p:"🧪", u:"將兩樣東西黏在一起", s:"膠"}]},
        {t:"電器", i:[{n:"電視", p:"📺", u:"看新聞和卡通片", s:"電"},{n:"冷氣", p:"❄️", u:"夏天令房間涼爽", s:"冷"},{n:"電話", p:"📱", u:"打電話與人通訊", s:"電"},{n:"風扇", p:"🌀", u:"轉動扇葉吹出風", s:"風"},{n:"吸塵機", p:"🧹", u:"吸走地板上的灰塵", s:"吸"}]},
        {t:"衣物", i:[{n:"襯衫", p:"👕", u:"穿在身上的短袖衣", s:"襯"},{n:"褲子", p:"👖", u:"穿在腿上的長褲", s:"褲"},{n:"鞋子", p:"👟", u:"穿在腳上走路", s:"鞋"},{n:"帽子", p:"🧢", u:"戴在頭上遮太陽", s:"帽"},{n:"襪子", p:"🧦", u:"穿在腳上，吸汗用", s:"襪"}]},
        {t:"職業", i:[{n:"醫生", p:"👨‍⚕️", u:"幫病人治病", s:"醫"},{n:"警察", p:"👮", u:"捉拿壞人，維持治安", s:"警"},{n:"老師", p:"👩‍🏫", u:"在學校教導學生", s:"老"},{n:"廚師", p:"👨‍🍳", u:"在廚房煮美味食物", s:"廚"},{n:"司機", p:"👨‍✈️", u:"駕駛車輛載客", s:"司"}]},
        {t:"餐具", i:[{n:"飯碗", p:"🥣", u:"裝飯或湯用", s:"飯"},{n:"筷子", p:"🥢", u:"兩枝木棍夾食物", s:"筷"},{n:"匙羹", p:"🥄", u:"喝湯或食粥用", s:"匙"},{n:"茶杯", p:"🥛", u:"裝水或茶來喝", s:"茶"},{n:"盤子", p:"🍽️", u:"盛載菜餚的平面器皿", s:"盤"}]}
    ];

    const sceneData = [
        {t:"超市付款", q:["呢個袋要收五蚊。", "唔該用八達通。", "幫我嘟一嘟。", "洗唔洗儲積分？", "唔洗喇，唔該。", "多謝晒。"]},
        {t:"搭的士", q:["唔該去中環站。", "行西隧會唔會快啲？", "呢度轉角停得喇。", "幾多錢話？", "收唔收現金？", "唔該晒。"]},
        {t:"飲茶點餐", q:["兩位唔該普洱。", "叫個燒賣同蝦餃。", "野食仲未到？", "唔該埋單。", "找番幾多錢？", "下次見。"]},
        {t:"睇醫生", q:["我有少少發燒。", "喉嚨好痛。", "洗唔洗打針？", "一日食幾次藥？", "記住戒口。", "多謝醫生。"]},
        {t:"理髮店", q:["修短少少就得。", "側邊剪薄啲。", "洗頭水好香。", "吹乾佢唔該。", "幾好睇喎。", "下次再黎。"]},
        {t:"圖書館", q:["我想借呢本書。", "幾時要還？", "可以續借嗎？", "還書箱喺邊？", "呢度好安靜。", "多謝。"]},
        {t:"公園晨運", q:["今日天氣好。", "一齊行下啦。", "呢度好多花。", "休息一陣先。", "飲啖水。", "聽日見。"]},
        {t:"餐廳找錢", q:["唔該埋單。", "呢度幾多錢？", "找返十蚊。", "唔使找喇。", "服務幾好。", "拜拜。"]},
        {t:"過馬路問路", q:["地鐵站點行？", "轉左定轉右？", "要行幾耐？", "過對面馬路？", "好清楚喇。", "唔該。"]},
        {t:"探訪老友", q:["好久不見。", "最近點呀？", "送份小禮物。", "入黎坐下。", "下次再聚。", "拜拜。"]}
    ];

    // --- 1. 核心邏輯：登入與導覽 ---
    function refreshV() { vCodeStr = Math.floor(1000+Math.random()*9000).toString(); document.getElementById('v-box').innerText = vCodeStr; }
    function checkAuth() {
        const id = document.getElementById('case-id').value;
        const pw = document.getElementById('case-pw').value;
        const vin = document.getElementById('v-in').value;
        if(usersData[id] && usersData[id] === pw && vin === vCodeStr) {
            currentUser = id;
            document.getElementById('u-name').innerText = id;
            document.getElementById('login-screen').style.display='none';
            document.getElementById('app-content').style.display='flex';
            speak("驗證成功，開始訓練");
        } else { alert("登入失敗：編號、密碼或驗證碼錯誤"); refreshV(); }
    }
    document.getElementById('logout-btn').onclick = () => location.reload();

    // --- 2. AI 口肌訓練 (視覺感應) ---
    function showMouthUI() {
        setModal(`<h3>👄 AI 口肌視覺訓練</h3><p>選擇訓練時間：</p>
        <div style="margin-bottom:15px;">${[10,20,30].map(s => `<button class="sub-btn" style="width:70px; margin:5px; background:${targetGoal==s?'var(--ts-red)':'#aaa'};" onclick="targetGoal=${s};showMouthUI()">${s}秒</button>`).join('')}</div>
        <div class="grid-10">${mouthData.map((m, idx) => `<div class="card-unit" onclick="openMouthAI(${idx})"><span style="font-size:30px;">${m.i}</span><br>${m.n}</div>`).join('')}</div>
        <button class="sub-btn" style="background:#666; width:100%; margin-top:15px;" onclick="closeAll()">離開系統</button>`);
    }

    async function openMouthAI(idx) {
        const m = mouthData[idx];
        setModal(`
            <h3>${m.n}</h3>
            <div style="font-size:80px; background:#fff; padding:10px; border-radius:20px; display:inline-block; border:4px solid var(--mouth-pink);">${m.i}</div>
            <p id="timer-disp">目標保持：${targetGoal} 秒</p>
            <div class="ai-vision-box">
                <video id="v-feed" autoplay playsinline></video>
                <div class="ai-circle-target"></div>
                <div class="ai-point-target" id="nose-dot"></div>
            </div>
            <p id="ai-stat" style="color:var(--ts-red); font-weight:bold;">📸 正在啟動 AI 影像偵測...</p>
            <div class="ctrl-panel">
                <button class="sub-btn" style="background:var(--ai-blue);" onclick="startMouthAI('${m.bs}')">開啟鏡頭</button>
                <button class="sub-btn" style="background:var(--gold);" onclick="speak('請參考圖示動作，對準紅圈並保持')">操作提示</button>
                <button class="sub-btn" style="background:#888;" onclick="showMouthUI()">返回</button>
                <button class="sub-btn" style="background:var(--ts-red);" onclick="closeAll()">退出</button>
            </div>`);
        startCamera();
    }

    async function startCamera() {
        cameraStream = await navigator.mediaDevices.getUserMedia({video:true});
        document.getElementById('v-feed').srcObject = cameraStream;
    }

    function startMouthAI(bsType) {
        let timeLeft = targetGoal;
        document.getElementById('ai-stat').innerText = "偵測中：請保持動作正確";
        if(countdownTimer) clearInterval(countdownTimer);
        countdownTimer = setInterval(() => {
            // 模擬 MediaPipe 係數邏輯：若檢測到係數 > 0.5 則計時
            timeLeft--;
            document.getElementById('timer-disp').innerText = `剩餘：${timeLeft} 秒`;
            if(timeLeft <= 0) {
                clearInterval(countdownTimer);
                speak("動作正確，獲得獎勵！"); addGold(50);
                document.getElementById('ai-stat').innerText = "🎉 達標成功！";
            }
        }, 1000);
    }

    // --- 3. AI 四步認知訓練 ---
    function showCogCatalog() {
        setModal(`<h3>🗣️ AI 認知選項目錄</h3><div class="grid-10">${cogData.map((c, idx) => `<div class="card-unit" onclick="showCogItems(${idx})">📂 ${c.t}</div>`).join('')}</div>
        <button class="sub-btn" style="background:#666; width:100%; margin-top:15px;" onclick="closeAll()">離開系統</button>`);
    }

    function showCogItems(cIdx) {
        setModal(`<h3>選擇練習物品</h3><div class="grid-10">${cogData[cIdx].i.map((item, idx) => `<div class="card-unit" onclick="runCogStep(1, ${cIdx}, ${idx})"><span style="font-size:30px;">${item.p}</span><br>${item.n}</div>`).join('')}</div>
        <button class="sub-btn" style="background:#888; width:100%;" onclick="showCogCatalog()">返回目錄</button>`);
    }

    let hintClickCount = 0;
    function runCogStep(step, c, i) {
        const item = cogData[c].i[i];
        let displayTxt = (step==1)?"？":(step==2)?`用途：${item.u}`:(step==3)?`首字：${item.s} ...`:item.n;
        setModal(`
            <div style="font-size:160px; margin:15px;">${item.p}</div>
            <div id="disp-area" style="font-size:26px; font-weight:bold; color:var(--speech-purple); padding:10px;">${displayTxt}</div>
            <div class="ctrl-panel">
                <button class="sub-btn" style="background:var(--gold);" id="hint-btn">💡 提示鍵</button>
                <button class="sub-btn" style="background:var(--ai-blue);" id="mic-btn">🎤 作答收音</button>
                <button class="sub-btn" style="background:#888;" onclick="showCogItems(${c})">返回</button>
                <button class="sub-btn" style="background:var(--ts-red);" onclick="runCogStep(1,${c},${(i+1)%5})">下一題</button>
            </div>`);
        
        const hBtn = document.getElementById('hint-btn');
        hBtn.onclick = () => {
            hintClickCount++;
            setTimeout(() => {
                if(hintClickCount === 1) {
                    if(step==1) speak("呢件係咩物品？");
                    else if(step==2) speak(`呢件物件嘅用途係 ${item.u}`);
                    else if(step==3) speak(`首字係 ${item.s}`);
                } else if(hintClickCount >= 2 && step < 4) {
                    runCogStep(step+1, c, i);
                }
                hintClickCount = 0;
            }, 300);
        };

        document.getElementById('mic-btn').onclick = () => {
            speak("請讀出名稱...");
            if(!recognizer) return;
            recognizer.start();
            recognizer.onresult = (e) => {
                const res = e.results[0][0].transcript;
                if(res.includes(item.n)) {
                    speak("答對了！"); addGold(30);
                    document.getElementById('disp-area').innerText = item.n;
                    document.getElementById('hint-btn').style.display = "none";
                } else { speak("不正確，請再試"); }
            };
        };
    }

    // --- 4. AI 真實情境應對 ---
    function showSceneMenu() {
        setModal(`<h3>📍 AI 真實情境目錄</h3><div class="grid-10">${sceneData.map((s, idx) => `<div class="card-unit" onclick="runScene(${idx})">📍 ${s.t}</div>`).join('')}</div>
        <button class="sub-btn" style="background:#666; width:100%; margin-top:15px;" onclick="closeAll()">離開系統</button>`);
    }

    let pOrder = 1;
    function runScene(idx) {
        pOrder = 1; const s = sceneData[idx];
        setModal(`
            <h3>情境：${s.t}</h3>
            <div id="p-res" style="min-height:100px; background:#fff; border:2px dashed var(--gold); padding:10px; text-align:left; border-radius:15px; margin-bottom:10px;"></div>
            <div id="p-pool">${[...s.q].sort(()=>Math.random()-0.5).map(t => `<button class="puzzle-key" onclick="tapPuzzle(this, '${t}')">${t}</button>`).join('')}</div>
            <div class="ctrl-panel">
                <button class="sub-btn" style="background:var(--ai-blue);" onclick="recognizeScene('${s.q[0]}')">🎤 作答鍵</button>
                <button class="sub-btn" style="background:#888;" onclick="showSceneMenu()">返回</button>
                <button class="sub-btn" style="background:var(--ts-red);" onclick="runScene(${(idx+1)%10})">下一題</button>
            </div>`);
    }
    function tapPuzzle(btn, t) { 
        speak(t); 
        document.getElementById('p-res').innerHTML += `<div style="font-size:14px;"><b>(${pOrder++})</b> ${t}</div>`; 
        btn.style.opacity = "0.3"; btn.onclick = null;
    }
    function recognizeScene(correct) {
        speak("請讀出完整句子");
        recognizer.start();
        recognizer.onresult = (e) => { if(e.results[0][0].transcript.includes(correct.slice(0,2))) { speak("良好應對！"); addGold(40); } };
    }

    // --- 5. AI 聲控/氣量 (isLoud 狀態鎖邏輯) ---
    function showGameUI(type) {
        setModal(`<h3>${type=='voice'?'🎵 AI 聲控開花':'🎈 AI 氣量遊戲'}</h3><p>設定目標：</p>
        <div>${[10,20,30].map(v => `<button class="sub-btn" style="width:70px; margin:5px; background:${targetGoal==v?'var(--wa-green)':'#aaa'};" onclick="targetGoal=${v};showGameUI('${type}')">${v}次</button>`).join('')}</div>
        <div id="game-stage" style="font-size:120px; margin:20px;">${type=='voice'?'🌱':'☁️'}</div>
        <div id="sound-bar-container"><div id="sound-bar-fill"></div></div>
        <p id="v-info" style="font-size:24px; font-weight:bold;">次數：0 / ${targetGoal}</p>
        <button class="big-btn" style="background:var(--ai-blue); width:100%;" onclick="startVoiceGame('${type}')">啟動收音咪</button>
        <button class="sub-btn" style="background:#666; width:100%; margin-top:10px;" onclick="closeAll()">離開系統</button>`);
    }

    async function startVoiceGame(type) {
        if(!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            const s = await navigator.mediaDevices.getUserMedia({audio:true});
            audioCtx.createMediaStreamSource(s).connect(analyser);
        }
        let count = 0; canTrigger = true;
        const data = new Uint8Array(analyser.frequencyBinCount);
        const loop = () => {
            analyser.getByteFrequencyData(data);
            let level = Math.min(100, data.reduce((a,b)=>a+b,0)/300);
            document.getElementById('sound-bar-fill').style.width = level + "%";
            
            // isLoud 狀態鎖邏輯
            if(level > 80 && canTrigger) {
                count++; canTrigger = false; // 鎖定，直到音量下降
                document.getElementById('v-info').innerText = `次數：${count} / ${targetGoal}`;
                if(type=='blow') document.getElementById('game-stage').style.transform = `scale(${1 + count/10})`;
                if(count >= targetGoal) {
                    document.getElementById('game-stage').innerText = type=='voice'?'🌸':'🎈';
                    speak("恭喜完成！"); addGold(100); cancelAnimationFrame(voiceTimer); return;
                }
            } else if(level < 40) { canTrigger = true; } // 解鎖，準備下一次計數
            voiceTimer = requestAnimationFrame(loop);
        };
        loop();
    }

    // --- 通用工具 ---
    function setModal(h) { document.getElementById('modal-container').style.display='flex'; document.getElementById('modal-body').innerHTML=h; }
    function closeAll() { 
        document.getElementById('modal-container').style.display='none'; 
        if(cameraStream) cameraStream.getTracks().forEach(t=>t.stop());
        cancelAnimationFrame(voiceTimer);
        if(countdownTimer) clearInterval(countdownTimer);
    }
    function addGold(n) { goldCount += n; document.getElementById('gold-val').innerText = goldCount; }
    function speak(t) { window.speechSynthesis.cancel(); let s = new SpeechSynthesisUtterance(t); s.lang='zh-HK'; window.speechSynthesis.speak(s); }
    function syncMongoDB() { alert("正在儲存數據至 MongoDB...\nAPI: al-1M9NaoV5LkBxsWispBCy5Jyy..."); }
    setInterval(()=>document.getElementById('time').innerText=new Date().toTimeString().slice(0,5), 1000);
    refreshV();
</script>
</body>
