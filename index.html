<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>『樂活金掌家』- 旗艦級 AI 言語治療系統</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <style>
        :root { --ts-red: #D90429;
                --ts-bg: #F4EBD0; --gold: #D4AF37; --wa-green: #25D366; --paper: #FCF9F2; --speech-purple: #8338EC; --mouth-pink: #FF85A1; --ai-blue: #00B4D8;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: "PingFang HK", "Microsoft JhengHei", sans-serif; background: var(--ts-bg); margin: 0;
               color: #333; height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }
        
        /* 1. 登入介面大升級 */
        #login-screen { position: fixed;
                        inset: 0; background: var(--ts-bg); z-index: 20000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px;
        }
        .login-card { background: white; padding: 40px; border-radius: 50px; border: 8px solid var(--ts-red);
                      text-align: center; width: 100%; max-width: 580px; box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }
        .login-card input { font-size: 28px; width: 95%; padding: 22px; margin-bottom: 20px;
                            border-radius: 20px; border: 4px solid #ccc; outline: none; }
        #v-box { display: none; } /* 先幫我取消驗證碼鍵及驗證碼 - 封鎖不顯示 */
        #v-in { display: none; }  /* 先幫我取消驗證碼鍵及驗證碼 - 封鎖不顯示 */
        
        /* 2. 導覽佈局 (垂直單欄) */
        header { background: var(--paper);
                 border-bottom: 8px double var(--ts-red); padding: 20px; text-align: center; }
        #app-content { display: none;
                       flex-direction: column; flex: 1; overflow-y: auto; }
        .nav-grid { display: flex; flex-direction: column;
                    gap: 15px; padding: 30px; align-items: center; }
        .big-btn { width: 95%; height: 120px;
                   border-radius: 40px; border: 8px solid white; color: white; font-size: 36px; font-weight: bold; cursor: pointer; box-shadow: 0 8px 15px rgba(0,0,0,0.2);
                   transition: 0.2s; }
        
        /* 3. 彈窗縮放 0.8 與 AI 視覺區 */
        .modal { display: none;
                 position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 10000; justify-content: center; align-items: center;
        }
        .modal-content { background: var(--paper); border: 12px solid var(--gold); border-radius: 60px; width: 98%;
                         max-width: 900px; padding: 35px; text-align: center; transform: scale(0.8); max-height: 98vh; overflow-y: auto;
        }
        
        .ai-vision-box { width: 100%;
                         height: 450px; background: #000; border-radius: 45px; position: relative; overflow: hidden; border: 10px solid var(--mouth-pink); margin: 25px 0;
        }
        #v-feed { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1);
        }
        .ai-target-circle { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
                            width: 280px; height: 280px; border: 12px dashed red; border-radius: 50%; pointer-events: none;
        }
        #nose-dot { position: absolute; width: 25px; height: 25px; background: lime; border-radius: 50%;
                    display: none; z-index: 5; }
        
        #sound-bar-container { width: 100%;
                               height: 60px; background: #ddd; border-radius: 30px; margin: 25px 0; border: 6px solid #555; overflow: hidden; position: relative;
        }
        #sound-bar-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #25D366, #FF4500);
                          transition: width 0.1s; }
        #sound-val-text { position: absolute; right: 20px; top: 50%;
                          transform: translateY(-50%); font-weight: bold; font-size: 24px; color: #000; }
        
        .grid-10 { display: grid;
                   grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .card-unit { background: #fff;
                     border: 6px solid #eee; border-radius: 35px; padding: 30px; font-weight: bold; font-size: 32px; box-shadow: 0 8px 0 #ddd; cursor: pointer;
        }
        .sub-btn { height: 90px; border-radius: 30px; font-weight: bold; color: white; font-size: 32px;
                   border: none; cursor: pointer; margin: 10px; padding: 0 35px; }
        .puzzle-key { background: white;
                      border: 7px solid var(--ts-red); padding: 22px; border-radius: 30px; margin: 15px; width: 95%; text-align: left; font-size: 30px; font-weight: bold; display: block;
                      box-shadow: 6px 6px 0 #ccc; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-card">
        <h1 style="color:var(--ts-red); font-size:60px; margin-bottom:10px;">樂活金掌家</h1>
        <p style="font-size:26px; font-weight:bold; margin-bottom:30px;">AI 言語治療專業訓練系統</p>
        <input type="text" id="case-id" placeholder="個案編號 (Case ID)">
        <input type="password" id="case-pw" placeholder="密碼 (Password)">
        
        <div id="v-box" onclick="refreshV()">DIRECT</div>
        <input type="text" id="v-in" placeholder="請輸入驗證碼" style="text-align:center;">
        
        <button class="big-btn" style="background:var(--ts-red); width:100%;"
                onclick="checkAuth()">直接進入</button>
    </div>
</div>

<div id="app-content">
    <header>
        <div id="time" style="font-size:45px; font-weight:900;">00:00</div>
        <div style="font-size:32px; font-weight:bold;">個案：<span id="u-name">---</span> |
             累計：<span id="gold-val">0</span></div>
        <div style="margin-top:20px;">
            <button onclick="syncMongoDB()" style="background:var(--wa-green); color:white; padding:15px 35px; font-size:24px; border-radius:25px; border:none; font-weight:bold;"> 檔同步紀錄</button>
            <button onclick="location.reload()" style="background:#666; color:white; padding:15px 35px; font-size:24px; border-radius:25px; border:none; margin-left:20px;"> 登出系統</button>
        </div>
    </header>
    <div class="nav-grid">
        <button class="big-btn" style="background:var(--mouth-pink);"
                onclick="showMouthUI()"> 口肌視覺</button>
        <button class="big-btn" style="background:var(--speech-purple);"
                onclick="showCogCatalog()"> 認知命名</button>
        <button class="big-btn" style="background:var(--ai-blue);"
                onclick="showSceneCatalog()"> 真實情境</button>
        <button class="big-btn" style="background:var(--wa-green);"
                onclick="showGameUI('voice')"> 聲控開花</button>
        <button class="big-btn" style="background:var(--ai-blue);"
                onclick="showGameUI('blow')"> 氣量脹大</button>
    </div>
</div>

<div id="modal-container" class="modal"><div class="modal-content" id="modal-body"></div></div>

<script>
    // --- 1. 連動 MongoDB 個案資料庫 ---
    const usersData = {
        "B5678": { pw: "56789", name: "Allen", gold: 150 },
        "A1234": { pw: "12345", name: "Bonnie", gold: 100 },
        "C13579": { pw: "13579", name: "Cathy", gold: 0 },
        "D2468": { pw: "24680", name: "Dan", gold: 50 },
        "E0001": { pw: "E1234", name: "Eva", gold: 20 },
        "F0001": { pw: "F1234", name: "Flower", gold: 30 },
        "G0001": { pw: "G1234", name: "Gin", gold: 350 },
        "H0001": { pw: "H1234", name: "Henry", gold: 400 }
    };
    let currentUser = null, goldCount = 0, vCodeStr = "DIRECT";
    let targetVal = 10, cameraStream = null, aiTimer = null, audioCtx = null, analyser = null;
    let faceMesh = null, cameraUtils = null; 
    let restLockActive = false; 
    let continuousCorrectSeconds = 0; 

    const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognizer = SpeechRec ? new SpeechRec() : null;
    if(recognizer) { recognizer.lang = 'zh-HK'; recognizer.continuous = false; }

    function refreshV() { vCodeStr = "DIRECT"; }
    
    function checkAuth() {
        const id = document.getElementById('case-id').value;
        const pw = document.getElementById('case-pw').value;
        if(usersData[id] && usersData[id].pw === pw) {
            currentUser = usersData[id];
            goldCount = currentUser.gold; 
            document.getElementById('u-name').innerText = currentUser.name;
            document.getElementById('gold-val').innerText = goldCount;
            document.getElementById('login-screen').style.display='none';
            document.getElementById('app-content').style.display='flex';
            speak("身份驗證成功，歡迎進入系統。");
        } else { 
            alert("登入失敗，請檢查編號或密碼。");
        }
    }

    // --- 2. AI 口肌視覺 (精準幾何絕對演算法版) ---
    const mouthData = [
        {n:"噘嘴", i:"😙", bs:"mouthPucker", d:"雙唇用力向前翹起"}, {n:"咧嘴", i:"😊", bs:"mouthSmile", d:"嘴角向兩邊拉開"},
        {n:"鼓腮", i:"😗", bs:"cheekPuff", d:"兩頰充滿空氣撐開"}, {n:"張大口", i:"😲", bs:"jawOpen", d:"下巴放鬆，盡量張大"},
        {n:"舌伸出", i:"👅", bs:"tongueOut", d:"舌頭盡量向正前方伸"}, {n:"抿嘴", i:"😐", bs:"mouthClose", d:"雙唇用力閉緊"},
        {n:"魚臉", i:"😚", bs:"mouthFrown", d:"兩頰向內吸做出魚嘴"}, {n:"舌向上", i:"⬆️", bs:"tongueUp", d:"舌尖向上觸碰上唇"},
        {n:"舌向下", i:"⬇️", bs:"tongueDown", d:"舌尖向下延伸"}, {n:"露齒", i:"😬", bs:"mouthSmile", d:"咬緊牙關用力橫拉"}
    ];

    function showMouthUI() {
        setModal(`<h2>👄 AI 口肌視覺訓練</h2><p style="font-size:32px;">設定目標秒數：</p>
        <div style="margin-bottom:25px;">${[10,20,30].map(s => `<button class="sub-btn" style="width:140px; background:${targetVal==s?'var(--ts-red)':'#aaa'};" onclick="targetVal=${s};showMouthUI()">${s}秒</button>`).join('')}</div>
        <div class="grid-10">${mouthData.map((m, idx) => `<div class="card-unit" onclick="openMouthAI(${idx})"><span style="font-size:80px;">${m.i}</span><br>${m.n}</div>`).join('')}</div>
        <button class="sub-btn" style="background:#666; width:100%; margin-top:40px;" onclick="closeAll()">返回主頁</button>`);
    }

    async function openMouthAI(idx) {
        const m = mouthData[idx];
        continuousCorrectSeconds = 0; 
        restLockActive = false;
        
        setModal(`
            <h2 style="font-size:55px;">${m.n}</h2>
            <div style="font-size:180px; background:#fff; padding:30px; border-radius:40px; border:10px solid var(--mouth-pink); display:inline-block;">${m.i}</div>
            <p id="timer-disp" style="font-size:50px; font-weight:bold; color:var(--ts-red);">目標：${targetVal} 秒</p>
            <div class="ai-vision-box"><video id="v-feed" autoplay playsinline></video><div class="ai-target-circle"></div><div id="nose-dot"></div></div>
            <p id="ai-stat" style="font-size:32px;">📸 AI 偵測準備中...</p>
            <div class="ctrl-panel"><button class="sub-btn" style="background:var(--ai-blue);" id="start-mp-btn">開啟鏡頭感應</button>
            <button class="sub-btn" style="background:var(--gold);" onclick="speak('${m.d}')">動作提示</button>
            <button class="sub-btn" style="background:#888;" onclick="showMouthUI()">返回目錄</button></div>`);

        document.getElementById('start-mp-btn').onclick = () => startFaceAI(m.bs);
        
        try {
            cameraStream = await navigator.mediaDevices.getUserMedia({video: {width:640, height:480}});
            const videoElement = document.getElementById('v-feed');
            if (videoElement) videoElement.srcObject = cameraStream;
        } catch (err) {
            console.error("無法啟動視訊鏡頭: ", err);
            document.getElementById('ai-stat').innerText = "❌ 無法讀取鏡頭驅動，請確認權限。";
        }
    }

    // 核心安全異步修復：確保 MediaPipe 穩定開啟
    async function startFaceAI(bsType) {
        // 先清理舊實例
        clearInterval(aiTimer);
        if (cameraUtils) { try { await cameraUtils.stop(); } catch(e){} }
        if (faceMesh) { try { await faceMesh.close(); } catch(e){} }
        
        document.getElementById('ai-stat').innerText = "🔍 AI 絕對幾何模型載入中...";
        let timeLeft = targetVal;

        try {
            faceMesh = new FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
            faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });

            faceMesh.onResults((results) => {
                if (restLockActive) return; 

                if (!results.multiFaceLandmarks || results.multiFaceLandmarks.length === 0) {
                    document.getElementById('ai-stat').innerText = "❌ 未偵測到面部";
                    const nd = document.getElementById('nose-dot');
                    if(nd) nd.style.display = "none";
                    return;
                }

                const landmarks = results.multiFaceLandmarks[0];
                const noseTip = landmarks[1];      
                const upperLip = landmarks[13];    
                const lowerLip = landmarks[14];    
                const leftCorner = landmarks[61];   
                const rightCorner = landmarks[291]; 

                // 物理絕對維度量化
                const mouthWidth = Math.hypot(rightCorner.x - leftCorner.x, rightCorner.y - leftCorner.y);
                const mouthHeight = Math.hypot(upperLip.x - lowerLip.x, upperLip.y - lowerLip.y);
                const cornerYDiff = Math.abs(rightCorner.y - leftCorner.y); 
                const noseDistFromCenter = Math.hypot(noseTip.x - 0.5, noseTip.y - 0.5);

                const noseDot = document.getElementById('nose-dot');
                if (noseDot) {
                    noseDot.style.display = "block";
                    noseDot.style.left = `${(1 - noseTip.x) * 100}%`; 
                    noseDot.style.top = `${noseTip.y * 100}%`;
                }

                const isInsideTargetCircle = noseDistFromCenter < 0.15;
                let isActionCorrect = false;

                switch(bsType) {
                    case "mouthPucker": 
                        if (mouthWidth < 0.08 && mouthHeight > 0.015) isActionCorrect = true;
                        break;
                    case "mouthSmile": 
                        if (mouthWidth > 0.14 && cornerYDiff < 0.02) isActionCorrect = true;
                        break;
                    case "jawOpen": 
                        if (mouthHeight > 0.06) isActionCorrect = true;
                        break;
                    case "mouthClose": 
                        if (mouthHeight < 0.008) isActionCorrect = true;
                        break;
                    default: 
                        if (mouthWidth > 0.10 && cornerYDiff < 0.03) isActionCorrect = true;
                        break;
                }

                if (isInsideTargetCircle && isActionCorrect) {
                    document.getElementById('ai-stat').innerText = "✅ 絕對位置與動作精準到位！";
                } else {
                    if (!isInsideTargetCircle) {
                        document.getElementById('ai-stat').innerText = "❌ 請將鼻子對準畫面紅圈中心";
                    } else {
                        document.getElementById('ai-stat').innerText = "❌ 動作幅度未完全到位";
                    }
                }
            });

            const videoElement = document.getElementById('v-feed');
            cameraUtils = new Camera(videoElement, {
                onFrame: async () => { 
                    try {
                        if(faceMesh && cameraStream) { await faceMesh.send({image: videoElement}); }
                    } catch(e) { console.log("幀追蹤被安全跳過"); }
                },
                width: 640, height: 480
            });
            
            await cameraUtils.start();
            document.getElementById('ai-stat').innerText = "🟢 AI 運作中，請面向鏡頭";

            // 啟動獨立秒數計時線程
            startCustomTimer(bsType, timeLeft);

        } catch (error) {
            console.error("AI 啟動失敗: ", error);
            document.getElementById('ai-stat').innerText = "❌ AI 模組加載失敗，請重試。";
        }
    }

    function startCustomTimer(bsType, timeLeft) {
        aiTimer = setInterval(async () => {
            if (restLockActive) return;
            const statBox = document.getElementById('ai-stat');
            if (!statBox) return;
            
            const statText = statBox.innerText;
            if (statText.startsWith("✅")) {
                timeLeft--;
                continuousCorrectSeconds++;
                document.getElementById('timer-disp').innerText = `保持中：${timeLeft} 秒`;

                if (continuousCorrectSeconds >= 3 && timeLeft > 0) {
                    clearInterval(aiTimer);
                    await triggerRestLock(bsType, timeLeft);
                }
            } else {
                continuousCorrectSeconds = 0; 
                if (Math.random() > 0.85) speak("請對準紅圈並做好動作。");
            }

            if(timeLeft <= 0) {
                clearInterval(aiTimer);
                speak("好嘢！獲得獎勵。");
                addGold(50);
                syncMongoDB();
                showMouthUI();
            }
        }, 1000);
    }

    // 異步隔離安全過渡鎖
    async function triggerRestLock(bsType, currentInternalTime) {
        restLockActive = true;
        continuousCorrectSeconds = 0;
        speak("做得好，請放鬆休息一下");
        
        let lockTimeLeft = 3.5;
        document.getElementById('ai-stat').innerHTML = `<span style="color:#00E676; font-weight:900; font-size:38px;">[REST_LOCK] 安全隔離！放鬆 3.5 秒</span>`;
        
        while (lockTimeLeft > 0) {
            const td = document.getElementById('timer-disp');
            if(td) td.innerText = `休息倒數：${lockTimeLeft.toFixed(1)} 秒`;
            await new Promise(res => setTimeout(res, 100));
            lockTimeLeft -= 0.1;
        }

        restLockActive = false;
        speak("預備，請繼續");
        startCustomTimer(bsType, currentInternalTime);
    }

    // --- 3. AI 認知訓練 ---
    const cogData = [
        {t:"水果", i:[{n:"蘋果", p:"🍎", u:"紅紅甜甜醫生遠離我", s:"蘋"},{n:"香蕉", p:"🍌", u:"黃色長條猴子愛食", s:"香"},{n:"西瓜", p:"🍉", u:"消暑必備綠皮紅肉", s:"西"},{n:"橙", p:"🍊", u:"橙色圓形維他命C", s:"橙"},{n:"葡萄", p:"🍇", u:"紫色圓形一串串", s:"葡"}]},
        {t:"交通", i:[{n:"巴士", p:"🚌", u:"大車有司機載客", s:"巴"},{n:"地鐵", p:"🚇", u:"地下火車", s:"地"},{n:"的士", p:"🚕", u:"紅色的車跳錶計錢", s:"的"},{n:"飛機", p:"✈️", u:"在天空中飛", s:"飛"},{n:"單車", p:"🚲", u:"用腳踏兩個圈", s:"單"}]},
        {t:"動物", i:[{n:"大象", p:"🐘", u:"長鼻大耳", s:"大"},{n:"獅子", p:"🦁", u:"萬獸之王鬃毛", s:"獅"},{n:"貓", p:"🐱", u:"喵喵叫捉老鼠", s:"貓"},{n:"狗", p:"🐶", u:"汪汪叫好朋友", s:"狗"},{n:"猴子", p:"🐒", u:"爬樹食香蕉", s:"猴"}]},
        {t:"文具", i:[{n:"鉛筆", p:"✏️", u:"寫字工具", s:"鉛"},{n:"書本", p:"📖", u:"閱讀知識", s:"書"},{n:"尺子", p:"📏", u:"畫線量長度", s:"尺"},{n:"剪刀", p:"✂️", u:"剪開紙張", s:"剪"},{n:"膠水", p:"🧪", u:"黐住兩樣嘢", s:"膠"}]}
    ];
    
    function showCogCatalog() {
        setModal(`<h2>🗣️ AI 認知選項目錄</h2><div class="grid-10">${cogData.map((c, idx) => `<div class="card-unit" onclick="showCogItems(${idx})">📂 ${c.t}</div>`).join('')}</div>
        <button class="sub-btn" style="background:#666; width:100%; margin-top:40px;" onclick="closeAll()">返回</button>`);
    }

    function showCogItems(cIdx) {
        setModal(`<h2>${cogData[cIdx].t} 練習清單</h2><div class="grid-10">${cogData[cIdx].i.map((item, idx) => `<div class="card-unit" onclick="runCogStep(1, ${cIdx}, ${idx})"><span style="font-size:120px;">${item.p}</span><br>${item.n}</div>`).join('')}</div>
        <button class="sub-btn" style="background:#888; width:100%;" onclick="showCogCatalog()">返回目錄</button>`);
    }

    let hStep = 0;
    function runCogStep(step, c, i) {
        const item = cogData[c].i[i];
        let displayTxt = (step==1)?"呢件係咩？":(step==2)?`用途：${item.u}`:(step==3)?`首字提示：${item.s}...`:item.n;
        setModal(`
            <div style="font-size:280px; margin:30px;">${item.p}</div>
            <div id="disp-area" style="font-size:60px; font-weight:bold; background:#fff; padding:40px; border-radius:40px; border:10px solid #ddd;">${displayTxt}</div>
            <div class="ctrl-panel"><button class="sub-btn" style="background:var(--gold);" id="hint-btn">💡 提示鍵</button>
            <button class="sub-btn" style="background:var(--ai-blue);" id="mic-btn">🎤 作答收音</button>
            <button class="sub-btn" style="background:#888;" onclick="showCogItems(${c})">返回</button>
            <button class="sub-btn" style="background:var(--ts-red);" onclick="runCogStep(1,${c},${(i+1)%4})">下一題</button></div>`);
        
        document.getElementById('hint-btn').onclick = () => {
            hStep++;
            setTimeout(() => {
                if(hStep === 1) { 
                    if(step==1) speak("呢件係咩物件？");
                    else if(step==2) speak("提示呢件物件用途係..." + item.u);
                    else if(step==3) speak("首字提示係..." + item.s);
                } else if(step < 4) { runCogStep(step+1, c, i); }
                hStep = 0;
            }, 350);
        };

        document.getElementById('mic-btn').onclick = () => {
            speak("請讀出正確名稱"); recognizer.start();
            recognizer.onresult = (e) => {
                if(e.results[0][0].transcript.includes(item.n)) {
                    speak("正確！獲得金幣獎勵。"); addGold(30);
                    document.getElementById('disp-area').innerText = item.n;
                    syncMongoDB();
                } else { speak("讀音不正確，請再試一次。"); }
            };
        };
    }

    // --- 4. AI 真實情境應對 ---
    const sceneData = [
        {t:"超市付款", q:["呢個袋收五蚊。", "唔該用八達通。", "幫我嘟一嘟。"]},
        {t:"搭的士", q:["唔該去中環站。", "行西隧快啲。", "呢度轉角停。"]}
    ];
    
    function showSceneCatalog() {
        setModal(`<h2>📍 AI 真實情境應對</h2><div class="grid-10">${sceneData.map((s, idx) => `<div class="card-unit" onclick="runScenePuzzle(${idx})">📍 ${s.t}</div>`).join('')}</div>
        <button class="sub-btn" style="background:#666; width:100%; margin-top:40px;" onclick="closeAll()">返回</button>`);
    }

    let pCount = 1;
    function runScenePuzzle(idx) {
        pCount = 1; const s = sceneData[idx];
        setModal(`
            <h3 style="font-size:50px;">情境：${s.t}</h3>
            <div id="p-res" style="min-height:220px; background:#fff; border:8px dashed var(--gold); padding:35px; margin-bottom:35px; text-align:left; border-radius:50px;"></div>
            <div id="p-pool">${[...s.q].sort(()=>Math.random()-0.5).map(t => `<button class="puzzle-key" onclick="tapPuzzle(this, '${t}')">${t}</button>`).join('')}</div>
            <div class="ctrl-panel"><button class="sub-btn" style="background:var(--ai-blue);" onclick="recScene('${s.q[0]}')">🎤 作答評估</button>
            <button class="sub-btn" style="background:#888;" onclick="showSceneCatalog()">返回目錄</button>
            <button class="sub-btn" style="background:var(--ts-red);" onclick="runScenePuzzle(${(idx+1)%2})">下一題</button></div>`);
    }

    function tapPuzzle(btn, t) { 
        speak(t); document.getElementById('p-res').innerHTML += `<div style="font-size:38px; margin:12px;"><b>(${pCount++})</b> ${t}</div>`;
        btn.style.opacity = "0.3"; btn.disabled = true;
    }
    
    function recScene(correct) {
        speak("請朗讀正確對話全句"); recognizer.start();
        recognizer.onresult = (e) => {
            if(e.results[0][0].transcript.includes(correct.slice(0,3))) { 
                speak("良好評估！獎勵 40 金幣。"); addGold(40); syncMongoDB();
            } else { speak("讀音未達標，請重試。"); }
        };
    }

    // --- 5. AI 聲控與氣量 ---
    function showGameUI(type) {
        setModal(`<h2>${type=='voice'?'🎵 聲控開花 (呀~)':'🎈 氣量脹大 (吹氣)'}</h2><p style="font-size:32px;">設定目標次數：</p>
        <div style="margin-bottom:20px;">${[10,20,30].map(v => `<button class="sub-btn" style="width:140px; background:${targetVal==v?'var(--wa-green)':'#aaa'};" onclick="targetVal=${v};showGameUI('${type}')">${v}次</button>`).join('')}</div>
        <div id="game-stage" style="font-size:250px; margin:40px;">${type=='voice'?'🌱':'☁️'}</div>
        <div id="sound-bar-container"><div id="sound-bar-fill"></div><div id="sound-val-text">0</div></div>
        <p id="v-info" style="font-size:50px; font-weight:bold;">次數：0 / ${targetVal}</p>
        <button class="big-btn" style="background:var(--ai-blue); width:100%;" onclick="startAudioGame('${type}')">啟動 AI 收音</button>
        <button class="sub-btn" style="background:#666; width:100%; margin-top:40px;" onclick="closeAll()">返回</button>`);
    }

    async function startAudioGame(type) {
        if(!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            const s = await navigator.mediaDevices.getUserMedia({audio:true});
            audioCtx.createMediaStreamSource(s).connect(analyser);
        }
        let count = 0, canTrigger = true;
        const data = new Uint8Array(analyser.frequencyBinCount);
        const loop = () => {
            if(!analyser) return;
            analyser.getByteFrequencyData(data);
            let level = Math.min(100, data.reduce((a,b)=>a+b,0)/450);
            const sbf = document.getElementById('sound-bar-fill');
            const svt = document.getElementById('sound-val-text');
            if(sbf) sbf.style.width = level + "%";
            if(svt) svt.innerText = Math.round(level);
            
            if(level > 80 && canTrigger) {
                count++; canTrigger = false;
                document.getElementById('v-info').innerText = `次數：${count} / ${targetVal}`;
                if(type=='blow') document.getElementById('game-stage').style.transform = `scale(${1 + count/10})`;
                if(count >= targetVal) { 
                    document.getElementById('game-stage').innerText = type=='voice'?'🌸':'🎈';
                    speak("完成目標！太棒了。"); addGold(100); syncMongoDB(); return; 
                }
            } else if(level < 40) { canTrigger = true; }
            requestAnimationFrame(loop);
        };
        loop();
    }

    // --- 通用工具 ---
    function setModal(h) { 
        document.getElementById('modal-container').style.display='flex'; 
        document.getElementById('modal-body').innerHTML=h;
    }
    
    async function closeAll() { 
        document.getElementById('modal-container').style.display='none';
        clearInterval(aiTimer); 
        if(cameraStream) { cameraStream.getTracks().forEach(t=>t.stop()); cameraStream = null; }
        if (cameraUtils) { try { await cameraUtils.stop(); } catch(e){} cameraUtils = null; }
        if (faceMesh) { try { await faceMesh.close(); } catch(e){} faceMesh = null; }
        window.speechSynthesis.cancel();
    }
    
    function addGold(n) { goldCount += n; document.getElementById('gold-val').innerText = goldCount; }
    function speak(t) { window.speechSynthesis.cancel(); let s = new SpeechSynthesisUtterance(t); s.lang='zh-HK'; window.speechSynthesis.speak(s); }
    function syncMongoDB() { alert("📊 訓練紀錄已自動同步至 MongoDB。"); }
    
    setInterval(()=> {
        const tBox = document.getElementById('time');
        if(tBox) tBox.innerText=new Date().toTimeString().slice(0,5);
    }, 1000);
</script>
</body>
</html>
